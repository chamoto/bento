name: Build Windows App

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "bento_auto_order/**"
      - ".github/workflows/build-windows.yml"

jobs:
  build-windows:
    runs-on: windows-latest

    defaults:
      run:
        working-directory: bento_auto_order

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-build.txt

      - name: Build executable
        run: |
          pyinstaller -y --clean --name BentoAutoOrder --windowed --onefile `
            --add-data ".env.example;." `
            --add-data "ajiya_sample_orders.csv;." `
            --add-data "sample_orders.csv;." `
            --add-data "google_form_sample_orders.csv;." `
            --add-data "google_form_count_result.csv;." `
            qt_app.py

      - name: Prepare artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist\BentoAutoOrder-windows | Out-Null
          Copy-Item dist\BentoAutoOrder.exe dist\BentoAutoOrder-windows\BentoAutoOrder.exe
          Copy-Item README.md dist\BentoAutoOrder-windows\README.md
          Copy-Item WINDOWS_README.md dist\BentoAutoOrder-windows\WINDOWS_README.md
          Copy-Item .env.example dist\BentoAutoOrder-windows\.env.example
          Copy-Item google_form_sample_orders.csv dist\BentoAutoOrder-windows\google_form_sample_orders.csv
          Copy-Item google_form_count_result.csv dist\BentoAutoOrder-windows\google_form_count_result.csv

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BentoAutoOrder-windows
          path: bento_auto_order/dist/BentoAutoOrder-windows
          include-hidden-files: true
